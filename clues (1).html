<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폐쇄병동 · 멀티플레이</title>

<style>
body { font-family: sans-serif; background:#0a0a0f; color:#eee; padding:20px; }
button { padding:10px; margin:5px; cursor:pointer; }
.card { border:1px solid #333; padding:10px; margin:10px 0; }
.collected { color:lime; }
</style>
</head>

<body>

<h1>폐쇄병동 (멀티플레이)</h1>
<p>Firebase 연결 버전</p>

<div id="app"></div>

<script type="module">

// ===== Firebase =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCP8PnY9Zinvt7DynBkjw5u3TkiTNDZEE",
  authDomain: "locked-ward.firebaseapp.com",
  databaseURL: "https://locked-ward-default-rtdb.firebaseio.com",
  projectId: "locked-ward",
  storageBucket: "locked-ward.firebasestorage.app",
  messagingSenderId: "966960188835",
  appId: "1:966960188835:web:8b916d5a5d45ca89369e16",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, "game");

// ===== 초기 데이터 =====
const defaultState = {
  collected: {}
};

let state = structuredClone(defaultState);

// ===== Firebase 실시간 받기 =====
onValue(stateRef, (snap) => {
  if (snap.val()) {
    state = snap.val();
  } else {
    set(stateRef, defaultState);
  }
  render();
});

// ===== 저장 =====
function save() {
  set(stateRef, state);
}

// ===== 데이터 =====
const clues = [
  "경비 CCTV",
  "알약",
  "금고",
  "설계도"
];

// ===== 클릭 =====
function collect(clue) {
  state.collected[clue] = "player";
  save();
}

// ===== 화면 =====
function render() {
  const app = document.getElementById("app");

  app.innerHTML = clues.map(c => {
    const got = state.collected[c];
    return `
      <div class="card">
        <div>${c}</div>
        <div class="${got ? 'collected' : ''}">
          ${got ? "획득됨" : "미획득"}
        </div>
        <button onclick="window.collect('${c}')">획득</button>
      </div>
    `;
  }).join("");
}

// 전역 연결
window.collect = collect;

</script>

</body>
</html>
